services:
  db:
    image: postgres:16-alpine
    container_name: micro-investment-db
    environment:
      - POSTGRES_DB=microinvestment
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d microinvestment"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: micro-investment-app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "6100:6100"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/microinvestment
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SERVER_PORT=6100
    restart: always

volumes:
  postgres_data:
