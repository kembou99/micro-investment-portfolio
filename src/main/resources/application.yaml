springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true


server:
  ssl:
    enabled: false
  port: 6200

logging:
  level:
    com.van.falawork_backend: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    # Logging des requêtes HTTP avec temps d'exécution
    org.springframework.web.servlet.DispatcherServlet: DEBUG
    org.springframework.web.filter.CommonsRequestLoggingFilter: DEBUG
    org.springframework.boot.actuate.trace.web.HttpTraceRepository: DEBUG
    org.springframework.boot.actuate.web.trace.HttpExchangeTracer: DEBUG
    # Pour voir les temps de réponse
    org.springframework.boot.actuate.metrics.web.servlet.WebMvcMetricsFilter: DEBUG

